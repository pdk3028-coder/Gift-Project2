<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - 사원 인사정보 시스템</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card" style="text-align: center;">
            <div class="card-header">
                <h1 class="card-title">반갑습니다, {{ name }}님</h1>
                <p class="card-description">원하시는 서비스를 선택해주세요.</p>
            </div>

            <div style="display: grid; gap: 1rem;">
                {% if enable_info %}
                <a href="{{ url_for('info_update') }}" class="btn btn-primary"
                    style="height: 3.5rem; font-size: 1.1rem;">
                    인사정보 수정
                </a>
                {% endif %}

                {% if enable_gift %}
                <a href="{{ url_for('gift_update') }}" class="btn btn-secondary"
                    style="margin-top: 0; background-color: white; border: 2px solid var(--primary-color); color: var(--primary-color); height: 3.5rem; font-size: 1.1rem;">
                    선물 배송지 관리
                </a>
                {% endif %}
            </div>

            <div class="section-divider"></div>

            <a href="{{ url_for('logout') }}" style="color: var(--text-secondary); text-decoration: none;">로그아웃</a>
        </div>
    </div>
</body>

</html>
