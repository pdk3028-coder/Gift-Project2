<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사원 인사정보 및 선물 배송지 관리</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">(주)풍산 기념품 조사</h1>
                <p class="card-description">본인 확인을 위해 사번을 입력해주세요.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="emp_id">사번</label>
                    <input type="text" id="emp_id" name="emp_id" required placeholder="사번 입력">
                </div>

                <button type="submit" class="btn btn-primary">확인하기</button>
            </form>

            <div style="text-align: center; margin-top: 1rem;">
                <a href="{{ url_for('admin') }}"
                    style="color: var(--text-secondary); font-size: 0.8rem; text-decoration: none;">관리자 페이지</a>
            </div>
        </div>
    </div>
</body>

</html>
